name: Test and deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_version:
        description: "Numeric beta version shown to users, for example 0.1.42-beta"
        required: false
        type: string
      release_notes:
        description: "Short release notes. Use semicolons for several items."
        required: false
        type: string
      skip_release_notice:
        description: "Do not notify bot users after deploy"
        required: false
        default: false
        type: boolean

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        run: python -B -m pytest -q

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    env:
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/opt/incubator-feed' }}
      VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
      VPS_HOST: ${{ secrets.VPS_HOST || '72.56.116.237' }}
      VPS_USER: ${{ secrets.VPS_USER || 'root' }}
      IMAGE_NAME: incubator-feed:latest
      CONTAINER_NAME: incubator-feed-bot

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check deployment secrets
        id: deploy-secrets
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          if [ -n "$VPS_SSH_KEY" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Deployment cannot start: configure VPS_SSH_KEY secret." >&2
            exit 1
          fi

      - name: Configure SSH
        if: steps.deploy-secrets.outputs.ready == 'true'
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_SSH_KEY"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Update project on VPS
        if: steps.deploy-secrets.outputs.ready == 'true'
        run: |
          ssh -i ~/.ssh/deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" "
            set -e
            DEPLOY_PATH='$DEPLOY_PATH'
            REPO_URL='https://github.com/NikitaZhilin/incubator-feed.git'
            BRANCH='main'
            if ! command -v docker >/dev/null 2>&1; then
              echo 'Docker is required on the VPS.' >&2
              exit 1
            fi
            if [ -d \"\$DEPLOY_PATH/.git\" ]; then
              git -C \"\$DEPLOY_PATH\" fetch origin \"\$BRANCH\"
              git -C \"\$DEPLOY_PATH\" checkout \"\$BRANCH\"
              git -C \"\$DEPLOY_PATH\" reset --hard \"origin/\$BRANCH\"
            else
              mkdir -p \"\$(dirname \"\$DEPLOY_PATH\")\"
              git clone --branch \"\$BRANCH\" \"\$REPO_URL\" \"\$DEPLOY_PATH\"
            fi
            mkdir -p \"\$DEPLOY_PATH/data\" \"\$DEPLOY_PATH/logs\" \"\$DEPLOY_PATH/backups\"
          "

      - name: Ensure production environment
        if: steps.deploy-secrets.outputs.ready == 'true'
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ADMIN_IDS: ${{ secrets.ADMIN_IDS }}
          RELEASE_VERSION_INPUT: ${{ github.event.inputs.release_version || '' }}
          RELEASE_NOTES_INPUT: ${{ github.event.inputs.release_notes || '' }}
          SKIP_RELEASE_NOTICE: ${{ github.event.inputs.skip_release_notice || 'false' }}
        run: |
          RELEASE_VERSION="$RELEASE_VERSION_INPUT"
          RELEASE_NOTES="$RELEASE_NOTES_INPUT"
          if [ "$SKIP_RELEASE_NOTICE" = "true" ]; then
            RELEASE_NOTICE_ENABLED="0"
            RELEASE_VERSION=""
            RELEASE_NOTES=""
          else
            RELEASE_NOTICE_ENABLED="1"
            if [ -z "$RELEASE_VERSION" ]; then
              RELEASE_VERSION="0.1.${GITHUB_RUN_NUMBER}-beta"
            fi
            if [ -z "$RELEASE_NOTES" ]; then
              RELEASE_NOTES="Добавлена кнопка Поделиться ботом; Бот можно открыть с другого Telegram-аккаунта; Данные разных Telegram-аккаунтов изолированы"
            fi
          fi
          if [ -n "$BOT_TOKEN" ]; then
            umask 077
            cat > .env.prod.deploy <<EOF
          ENVIRONMENT=prod
          BOT_TOKEN=$BOT_TOKEN
          BOT_TIMEZONE=Europe/Moscow
          DATABASE_PATH=data/incubator.db
          LOG_FILE=logs/bot.log
          LOG_LEVEL=INFO
          ADMIN_IDS=$ADMIN_IDS
          BACKUP_DIR=backups/prod
          REMINDER_INTERVAL_SECONDS=60
          MIN_FREE_DISK_MB=512
          RELEASE_NOTICE_ENABLED=$RELEASE_NOTICE_ENABLED
          RELEASE_VERSION=$RELEASE_VERSION
          RELEASE_NOTES=$RELEASE_NOTES
          EOF
            sed -i 's/^          //' .env.prod.deploy
            scp -i ~/.ssh/deploy_key -P "$VPS_PORT" .env.prod.deploy "$VPS_USER@$VPS_HOST:$DEPLOY_PATH/.env.prod"
            rm -f .env.prod.deploy
          else
            RELEASE_NOTICE_ENABLED_B64="$(printf '%s' "$RELEASE_NOTICE_ENABLED" | base64 -w0)"
            RELEASE_VERSION_B64="$(printf '%s' "$RELEASE_VERSION" | base64 -w0)"
            RELEASE_NOTES_B64="$(printf '%s' "$RELEASE_NOTES" | base64 -w0)"
            cat > update_env_release.py <<'PY'
          import base64
          import os
          from pathlib import Path

          path = Path(os.environ['ENV_PATH'])
          updates = {
              'RELEASE_NOTICE_ENABLED': base64.b64decode(os.environ['RELEASE_NOTICE_ENABLED_B64']).decode(),
              'RELEASE_VERSION': base64.b64decode(os.environ['RELEASE_VERSION_B64']).decode(),
              'RELEASE_NOTES': base64.b64decode(os.environ['RELEASE_NOTES_B64']).decode(),
          }
          lines = path.read_text(encoding='utf-8').splitlines()
          seen = set()
          new_lines = []
          for line in lines:
              key = line.split('=', 1)[0] if '=' in line else ''
              if key in updates:
                  new_lines.append(f'{key}={updates[key]}')
                  seen.add(key)
              else:
                  new_lines.append(line)
          for key, value in updates.items():
              if key not in seen:
                  new_lines.append(f'{key}={value}')
          path.write_text('\n'.join(new_lines) + '\n', encoding='utf-8')
          PY
            sed -i 's/^          //' update_env_release.py
            scp -i ~/.ssh/deploy_key -P "$VPS_PORT" update_env_release.py "$VPS_USER@$VPS_HOST:$DEPLOY_PATH/.update_env_release.py"
            rm -f update_env_release.py
            ssh -i ~/.ssh/deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" "
              set -e
              if [ ! -s '$DEPLOY_PATH/.env.prod' ]; then
                echo 'Missing $DEPLOY_PATH/.env.prod on VPS and BOT_TOKEN secret is not configured.' >&2
                exit 1
              fi
              RELEASE_NOTICE_ENABLED_B64='$RELEASE_NOTICE_ENABLED_B64' \
              RELEASE_VERSION_B64='$RELEASE_VERSION_B64' \
              RELEASE_NOTES_B64='$RELEASE_NOTES_B64' \
              ENV_PATH='$DEPLOY_PATH/.env.prod' \
              python3 '$DEPLOY_PATH/.update_env_release.py'
              rm -f '$DEPLOY_PATH/.update_env_release.py'
              chmod 600 '$DEPLOY_PATH/.env.prod'
            "
          fi

      - name: Start bot
        if: steps.deploy-secrets.outputs.ready == 'true'
        run: |
          ssh -i ~/.ssh/deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" "
            set -e
            cd '$DEPLOY_PATH'
            mkdir -p data logs backups
            docker build -t '$IMAGE_NAME' .
            docker run --rm --env-file .env.prod \
              -v '$DEPLOY_PATH/data:/app/data' \
              -v '$DEPLOY_PATH/logs:/app/logs' \
              -v '$DEPLOY_PATH/backups:/app/backups' \
              '$IMAGE_NAME' python -B scripts/migrate.py
            docker rm -f '$CONTAINER_NAME' >/dev/null 2>&1 || true
            docker run -d --name '$CONTAINER_NAME' --restart unless-stopped \
              --env-file '$DEPLOY_PATH/.env.prod' \
              -v '$DEPLOY_PATH/data:/app/data' \
              -v '$DEPLOY_PATH/logs:/app/logs' \
              -v '$DEPLOY_PATH/backups:/app/backups' \
              '$IMAGE_NAME' python main.py
            docker ps --filter name='$CONTAINER_NAME'
            docker exec '$CONTAINER_NAME' python -B -c 'from app.version import APP_VERSION; print(\"container app version\", APP_VERSION)'
            docker logs --tail=80 '$CONTAINER_NAME'
          "
