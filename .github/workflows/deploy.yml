name: Test and deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        run: python -B -m pytest -q

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    env:
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/opt/incubator-feed' }}
      VPS_PORT: ${{ secrets.VPS_PORT || '22' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_SSH_KEY"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Upload project
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          test -n "$VPS_USER"
          ssh -i ~/.ssh/deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" "mkdir -p '$DEPLOY_PATH'"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p $VPS_PORT" \
            --exclude '.git/' \
            --exclude '.env' \
            --exclude '.env.dev' \
            --exclude '.env.prod' \
            --exclude '.venv/' \
            --exclude '__pycache__/' \
            --exclude '.pytest_cache/' \
            --exclude 'data/' \
            --exclude 'logs/' \
            --exclude 'backups/' \
            ./ "$VPS_USER@$VPS_HOST:$DEPLOY_PATH/"

      - name: Write production environment
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ADMIN_IDS: ${{ secrets.ADMIN_IDS }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          test -n "$BOT_TOKEN"
          umask 077
          cat > .env.prod.deploy <<EOF
          ENVIRONMENT=prod
          BOT_TOKEN=$BOT_TOKEN
          BOT_TIMEZONE=Europe/Moscow
          DATABASE_PATH=data/incubator.db
          LOG_FILE=logs/bot.log
          LOG_LEVEL=INFO
          ADMIN_IDS=$ADMIN_IDS
          BACKUP_DIR=backups/prod
          REMINDER_INTERVAL_SECONDS=60
          MIN_FREE_DISK_MB=512
          EOF
          sed -i 's/^          //' .env.prod.deploy
          scp -i ~/.ssh/deploy_key -P "$VPS_PORT" .env.prod.deploy "$VPS_USER@$VPS_HOST:$DEPLOY_PATH/.env.prod"
          rm -f .env.prod.deploy

      - name: Start bot
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" "
            set -e
            cd '$DEPLOY_PATH'
            mkdir -p data logs backups
            docker compose build
            docker compose run --rm bot python -B scripts/migrate.py
            docker compose up -d bot
            docker compose ps
            docker compose logs --tail=80 bot
          "
